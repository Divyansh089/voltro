version: '3.8'

services:
  # ── Voltra API ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: voltra-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - DATABASE_URL=postgresql://voltra:voltra_secret@postgres:5432/voltra?schema=public&connection_limit=10
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voltra-network

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voltra-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: voltra
      POSTGRES_PASSWORD: voltra_secret
      POSTGRES_DB: voltra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voltra -d voltra']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voltra-network

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voltra-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - voltra-network

  # ── PgAdmin (Development Only) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: voltra-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@voltra.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - voltra-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  voltra-network:
    driver: bridge
